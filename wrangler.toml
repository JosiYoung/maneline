# -----------------------------------------------------------------
# KV — feature flags
#
# Namespace: maneline-flags (id below, created 2026-04-16 in the
# maneline-coming-soon Worker's account). An earlier provisioning
# attempt landed a same-named namespace in a different CF account; that
# one is orphaned and can be ignored.
# Keys the Worker reads:
#   feature:signup_v2   — "false" disables the v2 two-step signup and
#                         makes SignupPage fall back to the v1 single-step
#                         form. Any other value (or missing key) = enabled.
#
# Flip the flag:
#   npx wrangler kv key put --binding=FLAGS feature:signup_v2 false --remote
#   npx wrangler kv key put --binding=FLAGS feature:signup_v2 true  --remote
#   npx wrangler kv key delete --binding=FLAGS feature:signup_v2    --remote
# -----------------------------------------------------------------

[[kv_namespaces]]
binding = "FLAGS"
id      = "27bb09d5d64944e8be2a2b0733f542e7"

# -----------------------------------------------------------------
# STATIC ASSETS (Mane Line SPA)
#
# The React SPA lives in ./app and builds to ./app/dist. Workers Assets
# serves that directory:
#
#   - `run_worker_first = true` makes the Worker handle EVERY request, so
#     we can own specific paths like /webhook/sheets, /api/flags, /join,
#     and /healthz, then delegate everything else to
#     env.ASSETS.fetch(request).
#   - `not_found_handling = "single-page-application"` makes the asset
#     binding fall back to index.html for client-side routes (/app/*,
#     /trainer/*, /admin/*, etc.).
#   - `binding = "ASSETS"` exposes env.ASSETS inside the Worker.
#
# Before deploying: `cd app && npm run build` to produce app/dist.
# -----------------------------------------------------------------

[assets]
directory = "./app/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# -----------------------------------------------------------------
# WORKERS AI — binding for Phase 4 (Protocol Brain).
#
# The binding is live from Phase 0 so the skeleton compiles and the
# /api/_integrations-health endpoint can report presence. Real usage
# (classifySymptom, embedText, chatComplete) is wired in Phase 4;
# today the src/integrations/workers-ai.ts wrappers return mocks.
# -----------------------------------------------------------------
[ai]
binding = "AI"

# -----------------------------------------------------------------
# VECTORIZE — protocol/document embedding index for Phase 4.
#
# NOTE: `wrangler deploy` will FAIL until the index exists. Create it
# before the next deploy:
#
#   npx wrangler vectorize create maneline-protocols \
#     --dimensions=768 --metric=cosine
#
# 768 dims matches @cf/baai/bge-base-en-v1.5 (the default embedding
# model used in workers-ai.ts). Revisit if we swap models.
# -----------------------------------------------------------------
[[vectorize]]
binding    = "VECTORIZE_PROTOCOLS"
index_name = "maneline-protocols"
