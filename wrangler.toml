compatibility_date = "2025-10-01"

# -----------------------------------------------------------------
# ENVIRONMENT VARIABLES
#
# Non-secret (safe to commit): goes in [vars] below.
# Secrets (never commit): set via `npx wrangler secret put NAME`.
#
# The Worker expects these at runtime:
#
# Phase 0 (live today):
#   SUPABASE_URL               (public — set in [vars])
#   SUPABASE_ANON_KEY          (public — set in [vars] — RLS protects data)
#   SUPABASE_WEBHOOK_SECRET    (SECRET — `wrangler secret put ...`)
#   SUPABASE_SERVICE_ROLE_KEY  (SECRET — added in Phase 0 hardening 00004;
#                               required for /api/has-pin and /api/admin/*.
#                               Get it from Supabase dashboard →
#                               Settings → API → service_role key.)
#   GOOGLE_APPS_SCRIPT_URL     (SECRET — `wrangler secret put ...`)
#   GOOGLE_APPS_SCRIPT_SECRET  (SECRET — must match SHARED_SECRET in .gs)
#
# Phase 1 — Cloudflare R2 (private records bucket, SigV4 presigned URLs):
#   R2_ACCOUNT_ID              (public — 32-char hex account id. Safe to
#                               put in [vars]. Shown here as SECRET only so
#                               we can rotate without redeploying wrangler.)
#   R2_ACCESS_KEY_ID           (SECRET — S3-compat API token id.
#                               Create at Cloudflare dashboard → R2 →
#                               Manage R2 API Tokens → "Create API Token"
#                               with Object Read & Write scope on
#                               `maneline-records`.)
#   R2_SECRET_ACCESS_KEY       (SECRET — matching secret access key.
#                               Cloudflare shows it ONCE at token creation.)
#
# Phase 2 — Stripe (payments + trainer payouts):
#   STRIPE_SECRET_KEY          (SECRET — starts with sk_live_ / sk_test_)
#   STRIPE_WEBHOOK_SECRET      (SECRET — starts with whsec_)
#
# Phase 3 — Shopify (product catalog + checkout):
#   SHOPIFY_STORE_DOMAIN       (public — e.g. silver-lining-herbs.myshopify.com —
#                               can live in [vars] when we flip)
#   SHOPIFY_STOREFRONT_TOKEN   (SECRET — unauth'd storefront API, read-only catalog)
#   SHOPIFY_ADMIN_API_TOKEN    (SECRET — admin API, ONLY set if server-side
#                               order/inventory mutations are needed)
#
# Phase 5 — HubSpot (CRM lifecycle sync + product analytics):
#   HUBSPOT_PRIVATE_APP_TOKEN  (SECRET — "pat-na1-..." private-app token)
#   HUBSPOT_PORTAL_ID          (public — 8-digit hub id; can live in [vars])
